apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-interview-config
  namespace: default
data:
  DB_HOST: "<your-db-host>"
  DB_NAME: "<your-db-name>"
  DB_PORT: "5432"
  DB_POOL: "26"           # RAILS_MAX_THREADS(16) + 10 headroom (matches database.yml formula)
  RAILS_ENV: production
  RAILS_LOG_LEVEL: info
  WEB_CONCURRENCY: "2"
  RAILS_MAX_THREADS: "16"
  RAILS_MIN_THREADS: "16"
  GEMINI_LIVE_MODEL: gemini-2.0-flash-live-preview
  GEMINI_FLASH_MODEL: gemini-2.5-flash
  GEMINI_PRO_MODEL: gemini-2.5-pro
  PROACTIVE_RECONNECT_AFTER: "510"
  APP_BASE_URL: https://ai-interview-api.rakamin.com
  ALLOWED_ORIGINS: "https://<your-frontend-domain>"
