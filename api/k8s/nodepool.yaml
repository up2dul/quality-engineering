# GKE Node Pool — paragon-t2d-tau-pool (shared Tau T2D pool)
#
# Each node runs exactly 2 pods:
#   - 1 × ai-interview-api      (Rails/Puma, port 3001)
#   - 1 × ai-interview-sidekiq  (10 concurrent workers)
#
# ── Machine type: t2d-standard-* (Tau T2D — AMD EPYC, high compute/$ ratio) ─
#
# Pod resource limits:
#   API pod limit:      2.0 Gi RAM  + 2.0 CPU
#   Sidekiq pod limit:  1.5 Gi RAM  + 1.0 CPU
#   OS + DaemonSets:   ~0.5 Gi RAM  + 0.3 CPU
#   ─────────────────────────────────────────
#   Total peak:        ~4.0 Gi RAM  + 3.3 CPU
#
# Pods target this pool via GKE's built-in label:
#   nodeSelector:
#     cloud.google.com/gke-nodepool: paragon-t2d-tau-pool
#
# ── Verify nodes are in the pool ────────────────────────────────────────────
#
#   kubectl get nodes -l cloud.google.com/gke-nodepool=paragon-t2d-tau-pool
#   kubectl describe node <node-name> | grep -A5 Labels
#
# ── Scale (each replica needs one dedicated node) ───────────────────────────
#
#   kubectl scale deployment ai-interview-api      --replicas=<N>
#   kubectl scale deployment ai-interview-sidekiq  --replicas=<N>
#
#   Sidekiq's podAffinity follows the API pods automatically.
#   Make sure the pool has at least N nodes before scaling up.
