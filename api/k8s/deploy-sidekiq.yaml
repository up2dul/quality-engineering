apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-interview-sidekiq
  namespace: default
  annotations:
    kubernetes.io/change-cause: "initial-deploy"
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: ai-interview-sidekiq
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-interview-sidekiq
    spec:
      # ── Dedicated node pool ─────────────────────────────────────────────────
      nodeSelector:
        cloud.google.com/gke-nodepool: paragon-t2d-tau-pool
      
      tolerations:
        - key: cloud.google.com/compute-class
          operator: Equal
          value: paragon-compute-class-tau-nodepool
          effect: NoSchedule

      # ── Co-location rules ───────────────────────────────────────────────────
      affinity:
        # MUST land on a node that already has an ai-interview-api pod.
        # This keeps Sidekiq and the API on the same node (1:1 pairing).
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: ai-interview-api
              topologyKey: kubernetes.io/hostname

        # Only 1 Sidekiq pod per node — mirrors the API anti-affinity.
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: ai-interview-sidekiq
              topologyKey: kubernetes.io/hostname

      # Give in-flight jobs time to finish (timeout in sidekiq.yml = 300s)
      terminationGracePeriodSeconds: 60

      containers:
        - name: ai-interview-sidekiq
          image: asia-southeast2-docker.pkg.dev/rakamin-poc/rakamin-images/ai-interview-api:latest
          imagePullPolicy: Always
          command: ["bundle"]
          args: ["exec", "sidekiq", "-e", "staging"]

          envFrom:
            - configMapRef:
                name: ai-interview-config

          env:
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Sidekiq doesn't benefit from YJIT — disable to save memory
            - name: RUBYOPT
              value: "--yjit-disable"
            - name: LD_PRELOAD
              value: /usr/lib/x86_64-linux-gnu/libjemalloc.so.2
            - name: MALLOC_CONF
              value: "background_thread:true,metadata_thp:auto,dirty_decay_ms:5000,muzzy_decay_ms:5000,narenas:2"
            - name: OTEL_SERVICE_NAME
              value: ai-interview-sidekiq-staging

          # Sidekiq writes a status file that signals readiness
          readinessProbe:
            exec:
              command:
                - grep
                - -q
                - "READY: 1"
                - /ai-interview/tmp/sidekiq_status
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
            timeoutSeconds: 10

          livenessProbe:
            exec:
              command:
                - grep
                - -q
                - "READY: 1"
                - /ai-interview/tmp/sidekiq_status
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1536Mi"
